[package]
name = "grafana-utils-rust"
version = "0.2.0"
edition = "2021"
license = "Apache-2.0"
description = "Rust rewrite scaffold for Grafana dashboard and alerting utilities."

[dependencies]
base64 = "0.22"
clap = { version = "4.5", features = ["derive"] }
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
rpassword = "7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"

[dev-dependencies]
tempfile = "3"
