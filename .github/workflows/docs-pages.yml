name: Docs Pages

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Fetch release and preview refs
        run: git fetch --force --tags origin main dev
      - name: Assemble versioned HTML docs site
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/dev" ]; then
            python3 ./scripts/build_pages_site.py --output-dir ./build/docs-pages --include-dev
          else
            python3 ./scripts/build_pages_site.py --output-dir ./build/docs-pages
          fi
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: build/docs-pages

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
