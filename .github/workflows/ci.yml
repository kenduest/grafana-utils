name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip requests
      - name: Run Python quality gate
        run: make quality-python

  python-package:
    runs-on: ubuntu-latest
    needs:
      - python-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: python3 -m pip install --upgrade pip poetry
      - name: Install Python build dependencies
        run: |
          poetry install --with dev --extras http2
      - name: Build Python package artifacts
        run: make build-python
      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-${{ github.ref_name }}-${{ github.sha }}
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error

  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Run Rust quality gate
        run: make quality-rust

  rust-package:
    runs-on: ubuntu-latest
    needs:
      - rust-quality
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Rust release binaries
        run: make build-rust
      - name: Upload Rust package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-package-${{ github.ref_name }}-${{ github.sha }}
          path: |
            rust/target/release/grafana-util
            rust/target/release/grafana-access-utils
          if-no-files-found: error

  github-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - python-package
    permissions:
      contents: write
    steps:
      - name: Download Python package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-${{ github.ref_name }}-${{ github.sha }}
          path: release-assets/python
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release-assets/python/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
